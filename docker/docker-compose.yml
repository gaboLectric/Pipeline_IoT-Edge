version: '3.8'

services:
  sensor:
    build:
      context: .
      dockerfile: docker/sensor/Dockerfile
    container_name: iot-sensor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
      - SENSOR_ID=sensor-temp-1
      - EDGE_URL=http://edge-processor:4000/reading
      - COORD_HB_URL=http://coordinator:3000/heartbeat
    volumes:
      - ./rust/sensor:/app
    working_dir: /app
    depends_on:
      - edge

  edge:
    build:
      context: .
      dockerfile: docker/edge/Dockerfile
    container_name: edge-processor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
      - EDGE_ID=edge-node-1
      - COORDINATOR_URL=http://coordinator:3000/submit_report
      - COORD_HB_URL=http://coordinator:3000/heartbeat
    volumes:
      - ./rust/edge:/app
    working_dir: /app
    depends_on:
      - coordinator

  coordinator:
    build:
      context: .
      dockerfile: docker/coordinator/Dockerfile
    container_name: coordinator
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
    volumes:
      - ./rust/coordinator:/app
    working_dir: /app

networks:
  iot-network:
    driver: bridge
