version: '3.8'

services:
  sensor:
    build:
      context: .
      dockerfile: docker/sensor/Dockerfile
    container_name: iot-sensor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
    volumes:
      - ./rust/sensor:/app
    working_dir: /app

  edge:
    build:
      context: .
      dockerfile: docker/edge/Dockerfile
    container_name: edge-processor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
    volumes:
      - ./rust/edge:/app
    working_dir: /app
    depends_on:
      - sensor

  coordinator:
    build:
      context: .
      dockerfile: docker/coordinator/Dockerfile
    container_name: coordinator
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
    volumes:
      - ./rust/coordinator:/app
    working_dir: /app
    depends_on:
      - edge

networks:
  iot-network:
    driver: bridge
