# ⚠️ ARCHIVO LEGADO - SOLO PARA PRUEBAS LOCALES
#
# Este docker-compose.yml es útil para desarrollo y pruebas locales
# donde se ejecutan todos los servicios (sensor, edge, coordinator)
# en una sola máquina sin VPN.
#
# Para el CLUSTER DISTRIBUIDO real, usar:
#   - docker-compose.coordinator.yml (solo en el Hub)
#   - docker-compose.edge.yml (en cada máquina del equipo)
#
# Ver docs/CLUSTER_ROADMAP.md para más información.

version: '3.8'

services:
  sensor:
    build:
      context: ../
      dockerfile: docker/sensor/Dockerfile
    container_name: iot-sensor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
      - SENSOR_ID=sensor-temp-1
      # Inyección de dependencias estricta sin IPs hardcodeadas
      - EDGE_URL=http://edge:4000/reading
      - COORD_HB_URL=http://coordinator:3000/heartbeat
    depends_on:
      - edge
    cap_add:
      - NET_ADMIN

  edge:
    build:
      context: ../
      dockerfile: docker/edge/Dockerfile
    container_name: edge-processor
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
      - EDGE_ID=edge-node-1
      - PORT=4000
      - COORDINATOR_URL=http://coordinator:3000/submit_report
      - COORD_HB_URL=http://coordinator:3000/heartbeat
    depends_on:
      - coordinator
    cap_add:
      - NET_ADMIN

  coordinator:
    build:
      context: ../
      dockerfile: docker/coordinator/Dockerfile
    container_name: coordinator
    ports:
      - "3000:3000"
    networks:
      - iot-network
    environment:
      - RUST_LOG=info
      - PORT=3000
    cap_add:
      - NET_ADMIN

networks:
  iot-network:
    driver: bridge